name: Build and Deploy Docs

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued.  However, do NOT cancel in-progress runs as
# we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push to gh-pages branch

    steps:
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      - name: Load docs build config
        id: docs_config
        run: |
          BUILD_PDF=false
          if [[ -f .github/docs-build-config.yml ]]; then
            VALUE=$(grep -E '^[[:space:]]*build_pdf:[[:space:]]*(true|false)[[:space:]]*$' .github/docs-build-config.yml | tail -n 1 | cut -d':' -f2 | tr -d '[:space:]')
            if [[ "$VALUE" == "true" ]]; then
              BUILD_PDF=true
            fi
          fi
          echo "build_pdf=$BUILD_PDF" >> "$GITHUB_OUTPUT"
          echo "PDF generation enabled: $BUILD_PDF"

      # -----------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements/docs.txt

      # -----------------------------------------------------------------------
      - name: Cache APT packages
        if: steps.docs_config.outputs.build_pdf == 'true'
        uses: actions/cache@v4
        with:
          path: |
            /var/cache/apt/archives
            /var/lib/apt/lists
          key: ${{ runner.os }}-apt-docs-${{ hashFiles('requirements/docs.txt', '.github/workflows/docs.yml', '.github/docs-build-config.yml') }}
          restore-keys: |
            ${{ runner.os }}-apt-docs-

      # -----------------------------------------------------------------------
      - name: Install system dependencies
        if: steps.docs_config.outputs.build_pdf == 'true'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y \
            pandoc \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            texlive-plain-generic \
            texlive-science \
            latexmk

      # -----------------------------------------------------------------------
      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements/docs.txt

      # -----------------------------------------------------------------------
      - name: Save CI environment lockfile
        run: |
          mkdir -p docs/_build
          pip freeze > docs/_build/pip-freeze-ci.txt

      # -----------------------------------------------------------------------
      #- name: Execute notebooks
      #  working-directory: notebooks
      #    jupyter nbconvert --to notebook --execute --inplace \
      #      --ExecutePreprocessor.timeout=2400 \
      #      *.ipynb
      
      # DO NOT EXECUTE
      - name: Execute notebooks
        working-directory: notebooks
        run: |
          jupyter nbconvert --to notebook --inplace \
            *.ipynb

      # -----------------------------------------------------------------------
      - name: Build Sphinx documentation (HTML)
        run: |
          cd docs
          make html

      # -----------------------------------------------------------------------
      - name: Build Sphinx documentation (PDF via LaTeX)
        if: steps.docs_config.outputs.build_pdf == 'true'
        run: |
          cd docs
          make latexpdf LATEXOPTS="-interaction=nonstopmode" || true

      # -----------------------------------------------------------------------
      - name: Upload LaTeX log and source files
        if: always() && steps.docs_config.outputs.build_pdf == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: latex-logs-and-sources
          path: |
            docs/_build/latex/*.log
            docs/_build/latex/*.tex
            docs/_build/pip-freeze-ci.txt

      # -----------------------------------------------------------------------
      - name: Copy PDF into HTML output for static site
        if: steps.docs_config.outputs.build_pdf == 'true'
        run: |
          cp docs/_build/latex/JSBSimPythonExamples.pdf docs/_build/html/ || true

      # -----------------------------------------------------------------------
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

      # -----------------------------------------------------------------------
      - name: Upload PDF artifact
        if: always() && steps.docs_config.outputs.build_pdf == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: documentation-pdf
          path: docs/_build/latex/JSBSimPythonExamples.pdf
          if-no-files-found: ignore

  # ---------------------------------------------------------------------------
  deploy:
    # Only deploy on pushes to main (not on PRs)
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

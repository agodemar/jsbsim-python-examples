  - defaults

dependencies:
  - python=3.11
  - jupyterlab>=4.0
  - notebook>=7.0
  - nbconvert>=7.0
  - nbsphinx>=0.9
  - sphinx>=7.0
  - sphinx-rtd-theme>=2.0
  - myst-parser>=2.0
  - matplotlib>=3.7
  - numpy>=1.24
  - pandas>=2.0
  - scipy>=1.11
  - ipykernel
